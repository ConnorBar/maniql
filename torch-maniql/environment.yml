name: torch-maniql
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.8
  - pip
  - numpy
  - tqdm
  # RTX 4090 (Ada Lovelace, sm_89) requires CUDA 12.x. PyTorch 2.2 is the
  # last release that ships a Python 3.8 wheel; torchvision 0.17 matches.
  - pytorch=2.2.0
  - torchvision=0.17.0
  - pytorch-cuda=12.1
  # Pillow: seed_data.py + visualize_transitions.py + r3m setup.py
  - pillow>=9.0.1
  # imageio: visualize_transitions.py uses imageio.v2 (requires <3)
  - imageio<3
  - pip:
      - wandb
      # gdown: r3m/r3m/__init__.py downloads weights from Google Drive
      - gdown>=4.4.0
      - -e ./r3m
