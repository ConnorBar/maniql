  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.8
  - pip
  - numpy
  - tqdm
  - pytorch=2.2.0
  - torchvision=0.17.0
  - pytorch-cuda=12.1
  - pillow>=9.0.1
  - imageio<3
  - pip:
      # --- Isaac Gym / manifeel-isaacgymenvs deps ---
      - gym==0.23.1
      - omegaconf
      - termcolor
      - jinja2
      - hydra-core>=1.2
      - rl-games>=1.6.0
      - pyvirtualdisplay
      - urdfpy==0.0.22
      - pysdf==0.1.9
      - warp-lang==0.11.0
      - trimesh==3.23.5
      - networkx==3.1
      - ray
      # --- torch-maniql rollout deps ---
      - wandb
      - "imageio[ffmpeg]"
